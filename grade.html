<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greade Converter</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>


    <header>
        <nav>
            <h3>Jeet Patel</h3>
            <ul class="nav-links">
                <li><a href="index.html">Profile</a></li>
                <li><a href="grade.html" class="active">Grade Converter</a></li>
                <li><a href="staff.html">Staff</a></li>
                <li><a href="temperature.html">Temperature</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-content">

        <div class="page-header">
            <h1>Mark -> Grade</h1>
            <p>Enter a mark (0-100) to convert it to a grade.</p>
        </div>

        <div class="converter-card">

            <div class="inputBox">
                <input type="number" id="mark" placeholder="Enter mark">
            </div>
            <button onclick="MarkToGrade()">Convert</button>
            <p id="grade"></p>
            <p id="message"></p>

        </div>



        <div class="table-card">
            <h3>Grading Scheme</h3>
            <table>
                <thead>
                    <tr>
                        <th>GRADE</th>
                        <th>MARKS / PERSENTAGE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <strong>A</strong>
                        </td>
                        <td>90 - 100</td>
                    </tr>

                    <tr>
                        <td>
                            <strong>B</strong>
                        </td>
                        <td>80 - 89</td>
                    </tr>

                    <tr>
                        <td>
                            <strong>C</strong>
                        </td>
                        <td>70 - 79</td>
                    </tr>

                    <tr>
                        <td>
                            <strong>D</strong>
                        </td>
                        <td>60 - 69</td>
                    </tr>

                    <tr>
                        <td>
                            <strong>E</strong>
                        </td>
                        <td>50 - 59</td>
                    </tr>

                    <tr>
                        <td>
                            <strong>F</strong>
                        </td>
                        <td>0 - 49</td>
                    </tr>

                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>Copyright © 2026 Jeet Patel</p>
        <p>Today: <span id="currentDate"></span></p>
    </footer>

    <script src="script.js"></script>


</body>

</html>
